if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"
# Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Session and restore settings
set -g @continuum-restore 'on'
set -g @resurrect-dir '~/.local/share/tmux/resurrect'
set -g @resurrect-processes '"~nvim->~/.config/tmux/nvim-resurrect.sh" "~opencode->opencode -c" "~k9s->k9s" "~btm->btm"'
set -g @resurrect-hook-post-save-all '~/.config/tmux/resurrect-opencode-post-save.sh'
run '~/.config/tmux/plugins/tpm/tpm'

# Theme and style customizations
# Dracula theme
set -g @tmux-dracula 'dark'
set -g @dracula-plugins "cwd time"
set -g @dracula-cwd-max-dirs 3
set -g @dracula-cwd-max-chars 40
set -g @dracula-show-left-icon window
set -g @dracula-border-contrast true
set -g @dracula-refresh-rate 3
set -g @dracula-military-time true
set -g @dracula-time-format "UTC #(TZ='UTC0' date +'%H:%M %Z') | NY #(TZ='EST5EDT' date +'%H:%M %Z') "

# tmux style overrides
set -g status-position top
set -g status-style bg=black,fg=white
set -g status-left '#[fg=colour250,bg=default]  '
set -g status-left-length 4
set -gq @dual_time 'UTC --:-- | NY --:--'
set -g status-right '#{?#{==:#{@has_msg},1},#[fg=colour220]#[bg=default] (C-b m) ,}#(~/.config/tmux/plugins/tmux-continuum/scripts/continuum_save.sh) #[fg=colour250,bg=default]󰉋 #(~/.config/tmux/status-cwd-smart.sh "#{pane_current_path}" 52)   #[fg=colour250,bg=default]󰥔 #{@dual_time} '
set -g status-right-length 120
set-window-option -g window-status-style bg=default
set-window-option -g window-status-current-style bg=#1a1a1a,fg=colour255,bold
set-window-option -g window-status-activity-style bg=default,fg=default
set -g window-status-format ' #I #W#{?window_activity_flag, #[fg=colour220]•#[fg=default],} '
set -g window-status-current-format ' #[fg=colour40]▶#[fg=colour255] #W '
set -g pane-border-style fg=colour237
set -g pane-active-border-style fg=colour240,bg=default
set -g mode-style bg=colour24,fg=colour255
set -g copy-mode-selection-style bg=colour25,fg=colour255
set -g copy-mode-current-match-style bg=colour31,fg=colour255
set -g copy-mode-match-style bg=colour24,fg=colour252
set -g message-line 1
set -g message-style bg=#1a1a1a,fg=colour255
set -g message-command-style bg=#1a1a1a,fg=colour111
set -g display-time 1200

# Scroll back buffer size (200k lines)
set-option -g history-limit 200000

# Enable OSC52 clipboard integration
set-option -g set-clipboard on

set -g default-terminal 'tmux-256color'
set -g terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,wezterm:hyperlinks,xterm-256color:hyperlinks'

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# Set status info
# set-option -g status-interval 2  # Managed by Dracula via @dracula-refresh-rate to avoid conflicting refresh owners

# Set window notifications
setw -g monitor-activity on
set -g visual-activity off
set-window-option -g allow-passthrough on
set -g bell-action none
set -gq @has_msg 0
run-shell -b '/workspaces/dotfiles/.config/tmux/status-dual-time-updater.sh'
set-hook -g after-display-message 'run-shell -b "~/.config/tmux/message-inbox.sh add display"'
set-hook -g command-error 'run-shell -b "~/.config/tmux/message-inbox.sh add error"'

# Automatically set window title
setw -g automatic-rename on
set -g automatic-rename-format '#{?#{m:OC \|*,#{pane_title}},opencode,#{?#{==:#{pane_current_command},nvim},nvim,#{pane_current_command}}}'
# set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set-window-option -g mode-keys vi
set -g status-keys vi
set -g prefix2 C-a
# keybindings
bind r source-file ~/.config/tmux/tmux.conf
bind m display-popup -w 80% -h 70% -E "~/.config/tmux/message-inbox.sh view" \; set -gq @has_msg 0
bind S display-popup -w 85% -h 75% -d '#{pane_current_path}' -E "~/.config/tmux/sesh-switcher.sh"
# TODO: when nixpkgs ships sesh picker, replace switcher script with `sesh picker -i`.
bind L run-shell "sesh last"
bind M show-messages
bind-key -T prefix C-a send-prefix
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

#Mouse
set -g mouse on

#vi like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Open new windows and splits in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

#Fix vi mode switching delay
set -s escape-time 10
