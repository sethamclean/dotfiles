tools:
  - name: agent-ci-status-head
    description: Show GitHub Actions status for a commit ref and optionally fetch troubleshooting logs.
    use_when:
      - Need CI status for the HEAD commit or specific ref.
      - Need failed run logs for troubleshooting.
    args:
      - name: repo
        required: false
        description: GitHub repository in owner/repo format. Defaults to current repository.
      - name: ref
        required: false
        description: Git ref or commit SHA. Defaults to HEAD.
      - name: log_mode
        required: false
        description: none, failed, or all. Defaults to failed.
    env:
      - name: MAX_LOG_RUNS
        required: false
        description: Maximum number of runs to fetch logs for. Defaults to 3.
    safety:
      mode: read-only
      side_effects: none
    examples:
      - agent-ci-status-head
      - agent-ci-status-head myorg/myrepo
      - agent-ci-status-head myorg/myrepo HEAD failed
      - MAX_LOG_RUNS=1 agent-ci-status-head myorg/myrepo HEAD all

  - name: agent-jira-cloud-id
    description: Resolve Atlassian Jira cloudId from JIRA_URL (normalizes URL and queries tenant info).
    use_when:
      - Atlassian MCP call requires cloudId and user did not provide one.
      - Need to derive cloudId from Jira site URL for transparent Jira/Confluence calls.
    args:
      - name: jira_url
        required: false
        description: Jira site URL. Defaults to JIRA_URL environment variable.
    env:
      - name: JIRA_URL
        required: false
        description: Jira URL used when no positional argument is provided.
      - name: JIRA_USERNAME
        required: false
        description: Jira username/email for authenticated lookup (optional fallback).
      - name: JIRA_API
        required: false
        description: Jira API token for authenticated lookup.
      - name: JIRA_API_RO
        required: false
        description: Read-only Jira API token fallback when JIRA_API is not set.
    safety:
      mode: read-only
      side_effects: none
    examples:
      - zsh /root/bin/agent-jira-cloud-id
      - zsh /root/bin/agent-jira-cloud-id https://example.atlassian.net/jira
